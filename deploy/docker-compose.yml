# Minimal Supabase self-hosted stack for hugorm M3.
#
# Two services:
#   - postgres: supabase/postgres image with auth/storage/realtime schemas baked in.
#               Our app schema (app.tenants, app.tenant_members) is applied via
#               the init-script mount on first boot. For migrations after first
#               boot, psql into the container and apply new SQL manually.
#   - gotrue:   Supabase auth. Exposes REST at http://localhost:9999 for
#               signup/login flows. Dev may skip GoTrue entirely and mint JWTs
#               with `uv run python scripts/dev_bootstrap.py` instead.
#
# Bring up:
#   cd deploy
#   cp .env.example .env
#   uv run python gen_secrets.py >> .env    # fills in JWT_SECRET, ANON/SERVICE keys, POSTGRES_PASSWORD
#   docker compose up -d
#
# Host ports:
#   54322 -> postgres
#    9999 -> gotrue

name: hugorm-supabase

services:
  postgres:
    image: supabase/postgres:15.1.1.78
    container_name: hugorm-postgres
    restart: unless-stopped
    ports:
      - "54322:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: ${JWT_EXPIRY:-3600}
    volumes:
      - pg-data:/var/lib/postgresql/data
      # Named zz_/zzz_ so both run AFTER supabase/postgres' own migrate.sh,
      # which creates the auth schema (our FK depends on it) and the
      # supabase_auth_admin role (whose password we need to align).
      - ./sql/zz_app_schema.sql:/docker-entrypoint-initdb.d/zz_app_schema.sql:ro
      - ./sql/zzz_fix_roles.sh:/docker-entrypoint-initdb.d/zzz_fix_roles.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  gotrue:
    image: supabase/gotrue:v2.158.1
    container_name: hugorm-gotrue
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9999:9999"
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:9999}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@postgres:5432/postgres
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:8002}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS:-http://localhost:8002/**}
      GOTRUE_DISABLE_SIGNUP: ${DISABLE_SIGNUP:-false}
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY:-3600}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMTP_ADMIN_EMAIL: admin@example.com
      GOTRUE_MAILER_URLPATHS_INVITE: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify

  storage:
    image: supabase/storage-api:v1.19.3
    container_name: hugorm-storage
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      PGRST_JWT_SECRET: ${JWT_SECRET}
      AUTH_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@postgres:5432/postgres
      FILE_SIZE_LIMIT: "52428800"
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "false"
      POSTGREST_URL: http://postgres:5432
    volumes:
      - storage-data:/var/lib/storage

volumes:
  pg-data:
  storage-data:
